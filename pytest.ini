[pytest]
# test_endpoints_exist.py tests Flask routes — obsolete since Phase 3 (no Flask)
# Excluded from default run. To run legacy tests: pytest tests/test_endpoints_exist.py
#
# IMPORTANT: Always run pytest with the project venv active:
#   source hexstrike-env/bin/activate && pytest tests/ -q
# Running without the venv will fail with ModuleNotFoundError: No module named 'fastmcp'
addopts = --ignore=tests/test_endpoints_exist.py --ignore=tests/test_fastmcp_real_world.py
testpaths = tests
pythonpath = .
