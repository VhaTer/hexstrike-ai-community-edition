[pytest]
# test_endpoints_exist.py tests Flask routes — obsolete since Phase 3 (no Flask)
# test_real_integration.py and test_server_setup_standalone.py are slow integration tests
# (~54s and ~30s respectively). Run explicitly with:
#   pytest tests/test_real_integration.py -q
#   pytest tests/test_server_setup_standalone.py -q
#
# IMPORTANT: Always run pytest with the project venv active:
#   source hexstrike-env/bin/activate && pytest tests/ -q
# Running without the venv will fail with ModuleNotFoundError: No module named 'fastmcp'
addopts = --ignore=tests/test_endpoints_exist.py --ignore=tests/test_fastmcp_real_world.py --ignore=tests/test_real_integration.py --ignore=tests/test_server_setup_standalone.py
testpaths = tests
pythonpath = .
