# FROM kalilinux/kali-rolling (you provided this)
FROM kalilinux/kali-rolling

ENV DEBIAN_FRONTEND=noninteractive
ENV HEXSTRIKE_PORT=8888
ENV GOPATH=/go
ENV PATH="$GOPATH/bin:/usr/local/bin:/opt/hexstrike-venv/bin:$PATH"

# -----------------------------
# Base system + build tools
# -----------------------------
RUN apt-get update \
 && apt-get install -y --no-install-recommends \
    build-essential python3 python3-pip python3-venv git curl wget sudo \
    gnupg2 ca-certificates golang-go gcc libc6-dev pkg-config unzip \
    binutils bsdmainutils xxd zip unzip \
    nmap masscan amass dnsutils whois file \
    gobuster dirb ffuf sqlmap nikto wpscan hydra john hashcat \
    gdb radare2 binwalk foremost exiftool testdisk sleuthkit \
  && apt-get clean \
  && rm -rf /var/lib/apt/lists/*

# -----------------------------
# Python tools (pip)
# -----------------------------
# volatility3, ropgadget, checkov and other python-only tooling should be
# installed via pip (not apt) to avoid missing package problems.
RUN python3 -m pip install --no-cache-dir \
    volatility3 ropgadget checkov awscli

# -----------------------------
# Go-based tools (install to /usr/local/bin)
# -----------------------------
ENV GOPATH=/go
ENV GOBIN=/usr/local/bin
ENV PATH="$GOBIN:$PATH"
RUN go install github.com/projectdiscovery/nuclei/v2/cmd/nuclei@latest \
 && go install github.com/projectdiscovery/httpx/cmd/httpx@latest \
 && go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest \
 && go install github.com/projectdiscovery/katana/cmd/katana@latest \
 && go install github.com/hahwul/dalfox/v2@latest \
 && go install github.com/jaeles-project/jaeles/v2@latest

# -----------------------------
# Optional: install kubectl & helm via official scripts (small, robust)
# -----------------------------
# kubectl
RUN curl -fsSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" \
 && chmod +x /usr/local/bin/kubectl

# helm
RUN curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

# trivy (install via GitHub release)
RUN TRIVY_VER=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/') \
 && curl -fsSL -o /tmp/trivy.tar.gz "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VER}/trivy_${TRIVY_VER#v}_Linux-64bit.tar.gz" \
 && tar -xzf /tmp/trivy.tar.gz -C /tmp \
 && mv /tmp/trivy /usr/local/bin/trivy \
 && chmod +x /usr/local/bin/trivy \
 && rm -rf /tmp/trivy*

# -----------------------------
# Python virtual environment
# -----------------------------
RUN python3 -m venv /opt/hexstrike-venv
WORKDIR /app
COPY requirements.txt .
RUN /opt/hexstrike-venv/bin/pip install --no-cache-dir -r requirements.txt

# -----------------------------
# Copy application code
# -----------------------------
COPY . .

# -----------------------------
# Chromium (stabilisé pour Docker)
# -----------------------------
RUN apt-get update \
 && apt-get install -y --no-install-recommends chromium chromium-driver \
 && ln -s /usr/bin/chromium /usr/bin/google-chrome || true \
 && apt-get clean \
 && rm -rf /var/lib/apt/lists/*

ENV CHROME_FLAGS="--no-sandbox --disable-dev-shm-usage --disable-gpu"

# -----------------------------
# Expose port
# -----------------------------
EXPOSE 8888

# -----------------------------
# Healthcheck
# -----------------------------
HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
  CMD curl -f http://localhost:8888/health || exit 1

# -----------------------------
# Start HexStrike AI
# -----------------------------
CMD ["/opt/hexstrike-venv/bin/python", "hexstrike_server.py", "--port", "8888"]
