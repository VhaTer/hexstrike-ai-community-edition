<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HexStrike Pulse</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--bg-card:#13161e;--border:#252836;--text:#8b95a8;--text-h:#e2e8f0;--text-dim:#4a5568;--red:#ff2a2a;--green:#00e676;--amber:#ffc107;--accent:#dc143c;--font:sans-serif;--mono:"SF Mono","Fira Code",monospace}
body{background:var(--bg);color:var(--text);font:13px/1.5 var(--font);min-height:100vh}
.mono{font-family:var(--mono);font-size:12px}
/* ── Pulse keyframes ── */
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(220,20,60,.4)}50%{box-shadow:0 0 0 6px rgba(220,20,60,0)}}
@keyframes pulse-dot-ok{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.4)}50%{box-shadow:0 0 0 6px rgba(0,230,118,0)}}
@keyframes pulse-tab{0%,100%{box-shadow:inset 0 -2px 0 var(--accent)}50%{box-shadow:inset 0 -2px 0 var(--accent),0 0 12px -2px rgba(220,20,60,.25)}}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* ── Layout ── */
.topbar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--text-h);font-size:14px}
.brand svg{width:20px;height:20px}
.version{color:var(--text-dim);font-size:11px;font-family:var(--mono);margin-left:2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%}.dot.ok{background:var(--green);animation:pulse-dot-ok 2s infinite}.dot.warn{background:var(--amber)}.dot.err{background:var(--red);animation:pulse-dot 1.5s infinite}
/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg-card);position:sticky;top:40px;z-index:99;padding:0 12px}
.tab{padding:8px 16px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;font-size:11px;text-transform:uppercase;letter-spacing:.5px;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text-h)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);animation:pulse-tab 2.5s ease-in-out infinite}
.tab-panel{display:none}.tab-panel.active{display:block;animation:fade-in .25s ease-out}
/* ── Cards ── */
.main{max-width:1100px;margin:0 auto;padding:12px;width:100%}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;transition:border-color .3s}
.card:hover{border-color:rgba(220,20,60,.2)}
.card h3{color:var(--text-h);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.stat{padding:8px;background:var(--border);border-radius:6px;text-align:center;transition:background .2s}
.stat:hover{background:#1a1d28}
.stat .val{font:bold 18px/1 var(--mono);color:var(--text-h)}.stat .lbl{font-size:10px;color:var(--text-dim);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text-dim);font-size:10px;text-transform:uppercase;padding:3px 6px;border-bottom:1px solid var(--border)}
td{padding:3px 6px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px}
tr:hover{background:var(--bg-card2, #191c26)}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-family:var(--mono)}
.badge.critical{background:#3a0a0a;color:var(--red)}.badge.high{background:#3a0a0a;color:#ff6b6b}.badge.medium{background:#3a2a0a;color:var(--amber)}.badge.low{background:#0a1a3a;color:#6bb5ff}.badge.info{background:#0a1a3a;color:#8b95a8}
.badge.ok{background:#0a3a0a;color:var(--green)}.badge.fail{background:#3a0a0a;color:var(--red)}.badge.missing{background:#3a0a0a;color:var(--red)}
.badge.partial{background:#3a2a0a;color:var(--amber)}
.inline{display:flex;gap:4px;flex-wrap:wrap}.mt8{margin-top:8px}
.footer{text-align:center;padding:12px;color:var(--text-dim);font-size:11px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L20 6.5V17.5L12 22L4 17.5V6.5Z" stroke="#dc143c" stroke-width="1.5" fill="#dc143c" fill-opacity="0.15"/><polyline points="4.5,13 8.5,13 10.5,8 12.5,16 14.5,10 16.5,13 19.5,13" stroke="#dc143c" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> PULSE</div>
  <div class="version" id="version"></div>
  <div class="topbar-right">
    <span class="dot" id="dot"></span>
    <span class="mono" id="statusLabel" style="font-size:11px;color:var(--text-dim)">loading...</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
  <div class="tab" data-tab="workflow" onclick="switchTab('workflow')">Workflow</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">History</div>
</div>
<div id="overview" class="tab-panel active"><div class="main" id="root-overview"></div></div>
<div id="workflow" class="tab-panel"><div class="main" id="root-workflow"></div></div>
<div id="history" class="tab-panel"><div class="main" id="root-history"></div></div>
<div class="footer" id="footer"></div>
<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>{
    const isActive = p.id === name;
    p.classList.toggle('active', isActive);
    if(isActive){
      p.style.animation = 'none';
      requestAnimationFrame(()=>{ p.style.animation = ''; });
    }
  });
}
async function load(){
  try {
    const r = await fetch('/api/dashboard.json');
    const d = await r.json();
    if(d.status === 'error') throw new Error(d.error || 'unknown');
    render(d);
  } catch(e){
    document.querySelectorAll('.tab-panel .main').forEach(el=>{
      el.innerHTML = `<div class="card"><p style="color:var(--red)">⚠ Server unreachable: ${e.message}</p></div>`;
    });
    document.getElementById('statusLabel').textContent = 'offline';
    document.getElementById('dot').className = 'dot err';
  }
}
function render(d){
  const ok = d.status === 'healthy';
  document.getElementById('version').textContent = 'v' + esc(d.version);
  document.getElementById('dot').className = 'dot ' + (ok ? 'ok' : 'warn');
  document.getElementById('statusLabel').textContent = d.status;
  const v = d.version || '?', mem = d.memory || '—', up = fmtDur(d.uptime);

  // ── Tab 1: Overview ──
  const sc = d.scope || {};
  const sf = d.surface || {};
  const fi = d.findings || [];
  const cs = d.cache_status || {};
  const ig = d.intelligence || [];
  const hasRealIntel = ig.some(x => x.runs > 0);

  let ov = `<div class="card"><h3>System</h3><div class="grid">${stat(up,'uptime')}${stat(mem,'RAM')}${stat(d.tools_count ?? '—','tools')}${stat(d.missing_tools_count ?? 0,'missing')}</div></div>`;
  ov += card('Scope', sc.active_target
    ? esc(sc.active_target) + ' ' + badgel('info',sc.target_type||'?') + ' · ' + esc(sc.summary||'')
    : '<span style="color:var(--text-dim)">No active target</span>');
  ov += card('Surface ' + (sf.ports_count != null ? `(${sf.ports_count} ports, ${sf.techs_count||0} techs)` : ''),
    sf.target
      ? tbl(['Port','Service','Tech'], (sf.ports||[]).slice(0,20).map(p=>[
          esc(String(p.port||'')), esc(p.service||''), badgel(sf.risk||'info',p.service||'—')
        ]))
      : '<span style="color:var(--text-dim)">No surface data</span>');
  ov += card('Findings ' + (fi.length ? '('+fi.length+')' : ''),
    fi.length
      ? tbl(['Sev','ID','Tool','Details'], fi.map(f=>[
          badgel(f.severity||'info',f.severity||'?'), esc(f.id||''), esc(f.tool||''), esc(String(f.details||f.name||''))
        ]))
      : '<span style="color:var(--text-dim)">No findings</span>');
  ov += card('Cache ' + (d.cache_summary_text ? '· '+esc(d.cache_summary_text) : ''),
    cs.hits != null
      ? grid(stat(cs.hits||0,'hits')+stat(cs.misses||0,'misses')+stat(d.cache_hit_ratio_display||'—','hit rate')+stat((cs.cache_size||0)+'/'+(cs.max_size||'?'),'entries'))
      : '<span style="color:var(--text-dim)">No cache data</span>');
  ov += card('Intelligence',
    hasRealIntel
      ? tbl(['Tool','Score','Runs'], ig.slice(0,15).map(x=>[esc(x.tool||''), esc(x.score_display||x.score||''), esc(String(x.runs||''))]))
      : '<span style="color:var(--text-dim)">No data yet — run a scan first</span>');
  document.getElementById('root-overview').innerHTML = ov;

  // ── Tab 2: Workflow ──
  const pl = d.plan || {};
  const steps = pl.steps || [];
  const at = d.active_tools || {};
  const rl = d.rate_limit || {};
  const hasPlan = steps.length && steps.some(s => s.probability || s.eta);

  let wf = card('Plan',
    hasPlan
      ? tbl(['#','Tool','Outcome','Prob','ETA'], steps.map((s,i)=>[
          String(i+1), esc(s.tool||''), esc(s.outcome||''),
          s.probability ? esc(s.probability) : '—', s.eta ? esc(s.eta) : '—'
        ]))
      : '<span style="color:var(--text-dim)">' + esc(pl.summary || 'No active target — use scan(target) to start') + '</span>');
  wf += card('Active Tools',
    at.processes != null
      ? grid(stat(at.processes||0,'procs')+stat(at.workers||0,'workers')+stat(at.queued||0,'queued'))
      : '<span style="color:var(--text-dim)">No data</span>');
  wf += card('Rate Limit', rl.profile
    ? esc(rl.profile)+' · '+badgel(rl.profile==='stealth'?'fail':'info',rl.profile)
      +(rl.events?.length ? tbl(['Tool','Profile','Triggers'], rl.events.slice(0,10).map(e=>[
          esc(e.tool||''), esc(e.profile||''), esc(e.indicators||'')
        ])) : '')
    : '<span style="color:var(--text-dim)">No rate limit data</span>');
  wf += card('Missing Tools', d.missing_tools_count > 0
    ? grid(stat(d.missing_tools_count,'missing'))
    : '<span style="color:var(--text-dim)">All tools available</span>');
  wf += card('Async Scans', esc(d.async_scans || 'No async scans'));
  document.getElementById('root-workflow').innerHTML = wf;

  // ── Tab 3: History ──
  const hi = d.history || [];
  const er = d.errors || {};
  const tp = d.tool_performance || {};
  const tr = tp.tool_results || [];
  const cn = d.confirmations || {};
  const ni = d.network_io || {};
  const ss = d.sessions || {};

  let hist = card('History ' + (hi.length ? '('+hi.length+')' : ''),
    hi.length
      ? tbl(['Tool','Target','When','Status','Time'], hi.slice(0,30).map(hh=>[
          esc(hh.tool||''), esc(hh.target||''), esc(hh.age||''),
          badgel(hh.success?'ok':'fail',hh.status||'?'),
          esc(hh.execution_time!=null?hh.execution_time+'s':'')
        ]))
      : '<span style="color:var(--text-dim)">No history</span>');
  hist += card('Errors ' + (d.error_summary ? '· '+esc(d.error_summary) : ''),
    er.total_errors != null
      ? grid(stat(er.total_errors||0,'errors')+stat(er.timeout_count||0,'timeouts')+stat(er.slowest_tools?.length||0,'slowest'))
      : '<span style="color:var(--text-dim)">No error data</span>');
  hist += card('Tool Performance',
    tr.length
      ? tbl(['Tool','Rate','Runs','To'], tr.slice(0,20).map(t=>[
          esc(t.tool||''), esc(t.rate_display||''), esc(String(t.runs||'')), esc(String(t.timeouts||''))
        ]))
      : '<span style="color:var(--text-dim)">No data</span>');
  hist += card('Confirmations',
    cn.accepted != null
      ? grid(stat(cn.accepted||0,'accepted')+stat(cn.denied||0,'denied')+stat(cn.skipped||0,'skipped'))
      : '<span style="color:var(--text-dim)">No data</span>');
  hist += card('Network I/O',
    ni.bytes_sent != null
      ? grid(stat(fmtBytes(ni.bytes_sent||0),'sent')+stat(fmtBytes(ni.bytes_recv||0),'recv'))
      : '<span style="color:var(--text-dim)">No data</span>');
  hist += card('Sessions',
    ss.active != null
      ? grid(stat(ss.active||0,'active')+stat(ss.completed||0,'completed'))
      : '<span style="color:var(--text-dim)">No data</span>');
  document.getElementById('root-history').innerHTML = hist;

  // ── Footer ──
  document.getElementById('footer').textContent = `PULSE v${v} · ${up} uptime · ${mem} RAM · ${d.tools_count||'?'} tools · ${d.total_runs_display||'?'}`;
}
function card(t,c){return `<div class="card"><h3>${esc(t)}</h3>${c}</div>`}
function grid(c){return `<div class="grid">${c}</div>`}
function stat(v,l){return `<div class="stat"><div class="val">${esc(String(v))}</div><div class="lbl">${esc(l)}</div></div>`}
function tbl(cols,rows){return '<table><tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</table>'}
function badgel(v,t){return `<span class="badge ${esc(v)}">${esc(t)}</span>`}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m+'m'}
function fmtBytes(b){if(!b)return'0B';const u=['B','KB','MB','GB'];let i=0;while(b>=1024&&i<3){b/=1024;i++}return b.toFixed(1)+u[i]}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML}
load();
</script>
</body>
</html>
